<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAKC ULTRA | Al Jazeera Live</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ONYX DESIGN SYSTEM */
        :root {
            --bg-deep: #000000;
            --accent: #00f2ff;
            --accent-dim: rgba(0, 242, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #71717a;
            --error: #ff453a;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        .player-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        video { width: 100%; height: 100%; object-fit: contain; }

        /* OSD Layer */
        .osd-layer {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.85) 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        .player-container:hover .osd-layer { opacity: 1; }

        .osd-top { display: flex; justify-content: space-between; align-items: center; }
        .osd-channel-meta { display: flex; align-items: center; gap: 20px; }
        .osd-channel-meta h1 { font-size: 28px; font-weight: 900; font-family: 'Montserrat', 'Cairo', sans-serif; }

        .osd-bottom { display: flex; flex-direction: column; gap: 25px; }
        .osd-controls-row { display: flex; justify-content: space-between; align-items: center; }
        .control-group { display: flex; align-items: center; gap: 15px; }

        .osd-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.05);
            color: #fff;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .osd-btn:hover { background: var(--accent); color: #000; transform: scale(1.1); }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.08);
            padding: 0 20px;
            height: 54px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }

        input[type="range"] { width: 100px; accent-color: var(--accent); cursor: pointer; }

        .stream-info-badge {
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            display: flex;
            align-items: center; gap: 10px;
        }

        .live-dot {
            width: 8px; height: 8px; background: var(--error); border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .player-loader {
            position: absolute; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 5;
        }

        .spinner {
            width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; padding: 10px 25px; border-radius: 50px;
            font-weight: 700; z-index: 100; display: none;
        }

        .hide-cursor { cursor: none; }
    </style>
</head>
<body>

    <div class="player-container" id="videoWrapper">
        <div class="player-loader" id="playerLoader">
            <div class="spinner"></div>
            <p style="color: var(--text-dim)">جاري تشغيل الجزيرة مباشر...</p>
        </div>

        <video id="videoPlayer" playsinline autoplay muted></video>

        <div class="osd-layer" id="osdLayer">
            <div class="osd-top">
                <div class="osd-channel-meta">
                    <div class="osd-btn" style="background:var(--accent); color:#000;"><i class="fa-solid fa-globe"></i></div>
                    <div>
                        <h1>الشرقية نيوز</h1>
                        <p style="color:var(--text-dim); font-weight:700;">AL JAZEERA NEWS</p>
                    </div>
                </div>
            </div>

            <div class="osd-bottom">
                <div class="osd-controls-row">
                    <div class="control-group">
                        <button class="osd-btn" onclick="togglePlay()" id="playBtn"><i class="fa-solid fa-pause"></i></button>
                        <button class="osd-btn" onclick="reconnectStream()"><i class="fa-solid fa-rotate"></i></button>
                        <div class="volume-container">
                            <i class="fa-solid fa-volume-high" id="volIcon"></i>
                            <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0" oninput="setVolume(this.value)">
                        </div>
                    </div>

                    <div class="control-group">
                        <div class="stream-info-badge">
                            <div class="live-dot"></div>
                            <span id="qualityBadge">LIVE</span>
                        </div>
                        <button class="osd-btn" onclick="toggleFullscreen()"><i class="fa-solid fa-expand"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast">تم التشغيل التلقائي</div>

    <script>
        const STREAM_URL = "https://live.alarabiya.net/alarabiapublish/alhadath.smil/playlist.m3u8";
        let hls = null;
        let timeout;

        window.onload = initPlayer;

        function initPlayer() {
            const video = document.getElementById('videoPlayer');
            const loader = document.getElementById('playerLoader');

            if (Hls.isSupported()) {
                hls = new Hls({
                    manifestLoadingMaxRetry: 10,
                    manifestLoadingRetryDelay: 3000,
                    enableWorker: true
                });
                hls.loadSource(STREAM_URL);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    loader.style.display = 'none';
                    showToast("دراك لديكم لا خوف عليكم");
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                        else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = STREAM_URL;
                video.addEventListener('loadedmetadata', () => { video.play(); loader.style.display = 'none'; });
            }
            setupInactivity();
        }

        function togglePlay() {
            const video = document.getElementById('videoPlayer');
            const btn = document.getElementById('playBtn');
            if (video.paused) { video.play(); btn.innerHTML = '<i class="fa-solid fa-pause"></i>'; }
            else { video.pause(); btn.innerHTML = '<i class="fa-solid fa-play"></i>'; }
        }

        function setVolume(val) {
            const video = document.getElementById('videoPlayer');
            video.volume = val;
            video.muted = (val == 0);
            document.getElementById('volIcon').className = val == 0 ? "fa-solid fa-volume-xmark" : "fa-solid fa-volume-high";
        }

        function reconnectStream() { location.reload(); }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.getElementById('videoWrapper').requestFullscreen();
            else document.exitFullscreen();
        }

        function setupInactivity() {
            const wrapper = document.getElementById('videoWrapper');
            const osd = document.getElementById('osdLayer');
            wrapper.onmousemove = () => {
                clearTimeout(timeout);
                wrapper.classList.remove('hide-cursor');
                osd.style.opacity = '1';
                timeout = setTimeout(() => {
                    if (!document.getElementById('videoPlayer').paused) {
                        wrapper.classList.add('hide-cursor');
                        osd.style.opacity = '0';
                    }
                }, 3000);
            };
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
